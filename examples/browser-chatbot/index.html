<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FreeLLM Browser Chatbot</title>
  <style>
    :root { --bg:#0b0c0e; --panel:#15171b; --border:#262a31; --text:#e7e9ee; --muted:#8a8f98; --accent:#7aa2ff; }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body { background: var(--bg); color: var(--text); font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; font-size: 15px; line-height: 1.5; display: flex; justify-content: center; }
    main { width: 100%; max-width: 720px; padding: 24px 16px; display: flex; flex-direction: column; height: 100vh; }
    h1 { font-size: 18px; font-weight: 600; margin: 0 0 4px; }
    .sub { color: var(--muted); font-size: 13px; margin-bottom: 16px; }
    #log { flex: 1; overflow-y: auto; background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 16px; margin-bottom: 12px; }
    .msg { margin-bottom: 14px; white-space: pre-wrap; word-wrap: break-word; }
    .msg.user { color: var(--accent); }
    .msg .role { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 4px; }
    form { display: flex; gap: 8px; }
    input[type="text"] { flex: 1; background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; color: var(--text); font: inherit; }
    input[type="text"]:focus { outline: none; border-color: var(--accent); }
    button { background: var(--accent); color: #0b0c0e; border: 0; border-radius: 8px; padding: 10px 16px; font: inherit; font-weight: 600; cursor: pointer; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .status { color: var(--muted); font-size: 12px; margin-top: 8px; }
  </style>
</head>
<body>
  <main>
    <h1>FreeLLM Browser Chatbot</h1>
    <div class="sub">Streaming chat via short-lived browser tokens.</div>
    <div id="log"></div>
    <form id="form">
      <input id="input" type="text" placeholder="Ask something..." autocomplete="off" required />
      <button id="send" type="submit" disabled>Send</button>
    </form>
    <div id="status" class="status">Fetching token...</div>
  </main>
  <script type="module">
    import OpenAI from "https://esm.sh/openai@^4";

    const log = document.getElementById("log");
    const form = document.getElementById("form");
    const input = document.getElementById("input");
    const send = document.getElementById("send");
    const status = document.getElementById("status");
    const history = [{ role: "system", content: "You are a helpful assistant." }];

    function addMsg(role, text) {
      const wrap = document.createElement("div");
      wrap.className = "msg " + role;
      const r = document.createElement("div");
      r.className = "role";
      r.textContent = role;
      const b = document.createElement("div");
      b.textContent = text;
      wrap.appendChild(r);
      wrap.appendChild(b);
      log.appendChild(wrap);
      log.scrollTop = log.scrollHeight;
      return b;
    }

    let client, baseURL;
    try {
      const res = await fetch("/api/freellm-token");
      if (!res.ok) throw new Error("token fetch failed: " + res.status);
      const data = await res.json();
      baseURL = data.baseURL;
      client = new OpenAI({ apiKey: data.token, baseURL: baseURL + "/v1", dangerouslyAllowBrowser: true });
      status.textContent = "Token ready. Expires " + new Date(data.expiresAt).toLocaleTimeString() + ".";
      send.disabled = false;
    } catch (err) {
      status.textContent = "Failed to get token: " + err.message;
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const text = input.value.trim();
      if (!text || !client) return;
      input.value = "";
      send.disabled = true;
      history.push({ role: "user", content: text });
      addMsg("user", text);
      const out = addMsg("assistant", "");
      try {
        const stream = await client.chat.completions.create({
          model: "gpt-4o-mini",
          messages: history,
          stream: true,
        });
        let full = "";
        for await (const chunk of stream) {
          const delta = chunk.choices?.[0]?.delta?.content || "";
          full += delta;
          out.textContent = full;
          log.scrollTop = log.scrollHeight;
        }
        history.push({ role: "assistant", content: full });
      } catch (err) {
        out.textContent = "Error: " + err.message;
      } finally {
        send.disabled = false;
        input.focus();
      }
    });
  </script>
</body>
</html>
