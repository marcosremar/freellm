name: Feature Request
description: Suggest a new feature, improvement, or capability
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: checkboxes
    id: preflight
    attributes:
      label: Before submitting
      options:
        - label: I have searched existing issues and this is not a duplicate
          required: true
        - label: I have read the README and CONTRIBUTING.md to confirm this fits the project's scope
          required: true

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the frustration or pain point. Focus on the problem, not the solution.
      placeholder: I'm frustrated when ...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How you'd like it to work. Include API examples or mockups if helpful.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you've thought about and why they won't work as well.

  - type: dropdown
    id: area
    attributes:
      label: Area of the project
      description: Which part of FreeLLM does this affect?
      multiple: true
      options:
        - Gateway routing / failover
        - New provider adapter
        - Multi-key rotation
        - Response cache
        - Token usage tracking
        - Circuit breaker
        - Rate limiting
        - Authentication / security
        - Dashboard UI
        - Website / docs
        - Docker / deployment
        - DevX / SDKs
        - Observability (Prometheus, tracing)
        - Other

  - type: dropdown
    id: scope_check
    attributes:
      label: Does this fit FreeLLM's scope?
      description: |
        FreeLLM is built specifically for free-tier providers. It deliberately doesn't compete with LiteLLM (100+ providers), Portkey (enterprise), or OpenRouter (paid hosted).
      options:
        - "Yes — this helps users get more out of free LLM tiers"
        - "I'm not sure"
        - "Maybe — needs discussion"
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, examples, links to similar features in other tools, or anything else.
